name: Build and Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-26
            arch: arm64
            runtimes: apple-container,docker
            artifact: claudec-arm64-macos
          - os: macos-26-intel
            arch: x64
            runtimes: apple-container,docker
            artifact: claudec-x64-macos
          - os: ubuntu-24.04
            arch: x64
            runtimes: docker
            artifact: claudec-x64-linux
          - os: ubuntu-24.04-arm
            arch: arm64
            runtimes: docker
            artifact: claudec-arm64-linux

    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Swift
        uses: SwiftyLab/setup-swift@latest
        with:
          swift-version: "6.3"

      - name: Build release binary
        run: bash build.sh --runtimes "${{ matrix.runtimes }}"

      - name: Package binary
        run: |
          cd .build/release
          tar czf "${{ matrix.artifact }}.tar.gz" claudec
          mv "${{ matrix.artifact }}.tar.gz" "$GITHUB_WORKSPACE/"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: artifacts/*.tar.gz
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}
