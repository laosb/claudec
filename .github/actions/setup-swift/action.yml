name: Setup Swift
description: Install the pinned Swift toolchain and, optionally, the Static Linux SDK.

inputs:
  static-sdk:
    description: Set to "true" to install the Static Linux SDK.
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Setup Swift
      uses: SwiftyLab/setup-swift@latest
      with:
        swift-version: "6.3.1"

    - name: Cache Static Linux SDK
      if: inputs.static-sdk == 'true'
      id: cache-static-sdk
      uses: actions/cache@v4
      with:
        path: ~/.swiftpm/swift-sdks
        key: static-sdk-6.3.1-${{ runner.arch }}

    - name: Install Static Linux SDK
      if: inputs.static-sdk == 'true' && steps.cache-static-sdk.outputs.cache-hit != 'true'
      shell: bash
      run: swift sdk install https://download.swift.org/swift-6.3.1-release/static-sdk/swift-6.3.1-RELEASE/swift-6.3.1-RELEASE_static-linux-0.1.0.artifactbundle.tar.gz --checksum fac05271c1f7d060bd203240ce5251d5ca902d30ac899f553765dbb3a88b97ad
