name: Build and Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-26
            arch: arm64
            runtimes: apple-container,docker
            artifact: claudec-arm64-macos
          - os: macos-26-intel
            arch: x64
            runtimes: apple-container,docker
            artifact: claudec-x64-macos
          - os: ubuntu-24.04
            arch: x64
            runtimes: docker
            artifact: claudec-x64-linux
          - os: ubuntu-24.04-arm
            arch: arm64
            runtimes: docker
            artifact: claudec-arm64-linux
          - os: ubuntu-24.04
            arch: x64
            runtimes: docker
            artifact: claudec-x64-linux-static
            swift-sdk: x86_64-swift-linux-musl
          - os: ubuntu-24.04-arm
            arch: arm64
            runtimes: docker
            artifact: claudec-arm64-linux-static
            swift-sdk: aarch64-swift-linux-musl

    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Swift
        uses: SwiftyLab/setup-swift@latest
        with:
          swift-version: "6.3"

      - name: Install Static Linux SDK
        if: matrix.swift-sdk
        run: swift sdk install https://download.swift.org/swift-6.3-release/static-sdk/swift-6.3-RELEASE/swift-6.3-RELEASE_static-linux-0.1.0.artifactbundle.tar.gz --checksum d2078b69bdeb5c31202c10e9d8a11d6f66f82938b51a4b75f032ccb35c4c286c

      - name: Build release binary
        run: bash build.sh --runtimes "${{ matrix.runtimes }}"${{ matrix.swift-sdk && format(' --swift-sdk {0}', matrix.swift-sdk) || '' }}

      - name: Verify static linking
        if: matrix.swift-sdk
        run: file ./claudec | tee /dev/stderr | grep -q "statically linked"

      - name: Package binary
        run: tar czf "${{ matrix.artifact }}.tar.gz" claudec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: artifacts/*.tar.gz
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}
