name: Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  unit-tests:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-26
            arch: arm64
            traits: ContainerRuntimeAppleContainer,ContainerRuntimeDocker
          - os: macos-26-intel
            arch: x64
            traits: ContainerRuntimeAppleContainer,ContainerRuntimeDocker
          - os: ubuntu-24.04
            arch: x64
            traits: ContainerRuntimeDocker
          - os: ubuntu-24.04-arm
            arch: arm64
            traits: ContainerRuntimeDocker

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Swift
        uses: SwiftyLab/setup-swift@latest
        with:
          swift-version: "6.3"

      - name: Cache SPM build artifacts
        uses: actions/cache@v4
        with:
          path: .build
          key: spm-unit-${{ matrix.os }}-${{ matrix.arch }}-${{ hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: |
            spm-unit-${{ matrix.os }}-${{ matrix.arch }}-

      - name: Run unit tests
        run: swift test --disable-default-traits --traits "${{ matrix.traits }}" --filter 'AgentIsolationTests|AgentIsolationDockerRuntimeTests'

  build-test-image:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            arch: x64
          - os: ubuntu-24.04-arm
            arch: arm64

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build base image
        run: docker build -t ghcr.io/laosb/claudec:latest .

      - name: Export image
        run: docker save ghcr.io/laosb/claudec:latest | gzip > claudec-image.tar.gz

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: claudec-image-${{ matrix.arch }}
          path: claudec-image.tar.gz
          retention-days: 1

  integration-tests:
    needs: build-test-image
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            arch: x64
          - os: ubuntu-24.04-arm
            arch: arm64

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Swift
        uses: SwiftyLab/setup-swift@latest
        with:
          swift-version: "6.3"

      - name: Cache SPM build artifacts
        uses: actions/cache@v4
        with:
          path: .build
          key: spm-integration-${{ matrix.os }}-${{ matrix.arch }}-${{ hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: |
            spm-integration-${{ matrix.os }}-${{ matrix.arch }}-

      - name: Download base image
        uses: actions/download-artifact@v4
        with:
          name: claudec-image-${{ matrix.arch }}

      - name: Load base image
        run: gunzip -c claudec-image.tar.gz | docker load

      - name: Build binary
        run: bash build.sh --runtimes docker

      - name: Pre-clone configurations repo
        run: |
          mkdir -p ~/.agentc
          git clone --depth 1 https://github.com/laosb/agent-isolation-configurations ~/.agentc/configurations
          touch ~/.agentc/configurations/.agentc-last-pull

      - name: Cache shared test profiles
        uses: actions/cache@v4
        with:
          path: |
            ~/.agentc/profiles/__TEST_agentc_shared
          key: test-profiles-${{ matrix.arch }}-${{ hashFiles('bootstrap.sh', 'Dockerfile') }}

      - name: Run integration tests
        run: swift test --disable-default-traits --traits ContainerRuntimeDocker --filter AgentcIntegrationTests
        env:
          VERBOSE: 1

  integration-tests-static:
    needs: build-test-image
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            arch: x64
            swift-sdk: x86_64-swift-linux-musl
          - os: ubuntu-24.04-arm
            arch: arm64
            swift-sdk: aarch64-swift-linux-musl

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Swift
        uses: SwiftyLab/setup-swift@latest
        with:
          swift-version: "6.3"

      - name: Cache Static Linux SDK
        id: cache-static-sdk
        uses: actions/cache@v4
        with:
          path: ~/.swiftpm/swift-sdks
          key: static-sdk-${{ matrix.swift-sdk }}-6.3

      - name: Install Static Linux SDK
        if: steps.cache-static-sdk.outputs.cache-hit != 'true'
        run: swift sdk install https://download.swift.org/swift-6.3-release/static-sdk/swift-6.3-RELEASE/swift-6.3-RELEASE_static-linux-0.1.0.artifactbundle.tar.gz --checksum d2078b69bdeb5c31202c10e9d8a11d6f66f82938b51a4b75f032ccb35c4c286c

      - name: Cache SPM build artifacts
        uses: actions/cache@v4
        with:
          path: .build
          key: spm-static-${{ matrix.os }}-${{ matrix.arch }}-${{ hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: |
            spm-static-${{ matrix.os }}-${{ matrix.arch }}-

      - name: Download base image
        uses: actions/download-artifact@v4
        with:
          name: claudec-image-${{ matrix.arch }}

      - name: Load base image
        run: gunzip -c claudec-image.tar.gz | docker load

      - name: Build static binary
        run: bash build.sh --runtimes docker --swift-sdk ${{ matrix.swift-sdk }}

      - name: Verify static linking
        run: |
          file ./agentc | tee /dev/stderr | grep -q "statically linked"

      - name: Pre-clone configurations repo
        run: |
          mkdir -p ~/.agentc
          git clone --depth 1 https://github.com/laosb/agent-isolation-configurations ~/.agentc/configurations
          touch ~/.agentc/configurations/.agentc-last-pull

      - name: Cache shared test profiles
        uses: actions/cache@v4
        with:
          path: |
            ~/.agentc/profiles/__TEST_agentc_shared
          key: test-profiles-static-${{ matrix.arch }}-${{ hashFiles('bootstrap.sh', 'Dockerfile') }}

      - name: Run integration tests
        run: swift test --disable-default-traits --traits ContainerRuntimeDocker --filter AgentcIntegrationTests
        env:
          VERBOSE: 1
