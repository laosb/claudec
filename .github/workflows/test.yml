name: Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  unit-tests:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-26
            arch: arm64
            traits: ContainerRuntimeAppleContainer,ContainerRuntimeDocker
          - os: macos-26-intel
            arch: x64
            traits: ContainerRuntimeAppleContainer,ContainerRuntimeDocker
          - os: ubuntu-24.04
            arch: x64
            traits: ContainerRuntimeDocker
          - os: ubuntu-24.04-arm
            arch: arm64
            traits: ContainerRuntimeDocker

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Swift
        uses: SwiftyLab/setup-swift@latest
        with:
          swift-version: "6.3"

      - name: Run unit tests
        run: swift test --disable-default-traits --traits "${{ matrix.traits }}" --filter 'AgentIsolationTests|AgentIsolationDockerRuntimeTests'

  integration-tests:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            arch: x64
          - os: ubuntu-24.04-arm
            arch: arm64

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Swift
        uses: SwiftyLab/setup-swift@latest
        with:
          swift-version: "6.3"

      - name: Pull image
        run: docker pull ghcr.io/laosb/claudec:latest

      - name: Build binary
        run: bash build.sh --runtimes docker

      - name: Cache shared test profile
        uses: actions/cache@v4
        with:
          path: ~/.claudec/profiles/__TEST_shared
          key: claudec-test-profile-${{ matrix.arch }}-${{ hashFiles('bootstrap.sh') }}

      - name: Run integration tests
        run: swift test --disable-default-traits --traits ContainerRuntimeDocker --filter ClaudecIntegrationTests
        env:
          CLAUDEC_CONTAINER_RUNTIME: docker
          VERBOSE: 1
