name: Test

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  unit-tests:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-26
            arch: arm64
            traits: ContainerRuntimeAppleContainer,ContainerRuntimeDocker
          - os: macos-26-intel
            arch: x64
            traits: ContainerRuntimeAppleContainer,ContainerRuntimeDocker
          - os: ubuntu-24.04
            arch: x64
            traits: ContainerRuntimeDocker
          - os: ubuntu-24.04-arm
            arch: arm64
            traits: ContainerRuntimeDocker

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Swift
        uses: SwiftyLab/setup-swift@latest
        with:
          swift-version: "6.3"

      - name: Run unit tests
        run: swift test --traits "${{ matrix.traits }}" --filter 'AgentIsolationTests|AgentIsolationDockerRuntimeTests'

  integration-tests:
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Swift
        uses: SwiftyLab/setup-swift@latest
        with:
          swift-version: "6.3"

      - name: Install container CLI
        run: brew install container

      - name: Start container system
        run: container system start --enable-kernel-install

      - name: Pull image
        run: container image pull ghcr.io/laosb/claudec:latest

      - name: Build and sign binary
        run: bash build.sh

      - name: Cache shared test profile
        uses: actions/cache@v4
        with:
          path: ~/.claudec/profiles/__TEST_shared
          key: claudec-test-profile-${{ hashFiles('bootstrap.sh') }}

      - name: Run integration tests
        run: swift test --filter ClaudecIntegrationTests
        env:
          VERBOSE: 1
