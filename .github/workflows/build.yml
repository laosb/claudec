name: Build and Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: macos-26
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Swift
        uses: SwiftyLab/setup-swift@latest
        with:
          swift-version: "6.3"

      - name: Build release binary
        run: swift build -c release

      - name: Sign binary
        run: |
          codesign --sign - \
            --entitlements signing/claudec.entitlements \
            --force .build/release/claudec

      - name: Package binary
        run: |
          cd .build/release
          tar czf claudec-arm64-macos.tar.gz claudec
          mv claudec-arm64-macos.tar.gz "$GITHUB_WORKSPACE/"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: claudec-arm64-macos
          path: claudec-arm64-macos.tar.gz

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: claudec-arm64-macos.tar.gz
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}
